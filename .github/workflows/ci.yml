name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv & install
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -r requirements.txt
          .venv/bin/pip install -q pytest pytest-asyncio httpx

      - name: Run tests
        run: .venv/bin/python -m pytest tests/test_fortify.py tests/test_api_contracts.py -v --tb=short -q

      - name: Run benchmark probes (strict SLA)
        run: .venv/bin/python -m pytest tests/test_bench_fortify.py -v --tb=short -m benchmark

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        continue-on-error: true
